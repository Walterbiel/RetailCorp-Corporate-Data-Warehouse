version: 2

models:
  - name: dim_customers
    description: "Dimensão de clientes. Grão: 1 linha por cliente único. SCD Tipo 1."
    columns:
      - name: customer_sk
        tests: [unique, not_null]
      - name: customer_id
        tests: [unique, not_null]
      - name: customer_segment
        tests:
          - accepted_values:
              values: ['B2C', 'B2B', 'VIP']

  - name: dim_products
    description: "Dimensão de produtos. Grão: 1 linha por produto. SCD Tipo 1."
    columns:
      - name: product_sk
        tests: [unique, not_null]
      - name: product_id
        tests: [unique, not_null]
      - name: margin_tier
        tests:
          - accepted_values:
              values: ['Alta Margem', 'Margem Média', 'Margem Baixa', 'Prejuízo']

  - name: dim_date
    description: "Dimensão de datas. Calendário de 2022 a 2026. Grão: 1 linha por dia."
    columns:
      - name: date_sk
        tests: [unique, not_null]
      - name: full_date
        tests: [unique, not_null]

  - name: fact_sales
    description: >
      Fato de vendas. Grão: 1 linha por item de pedido não-cancelado.
      Contém surrogate keys para todas as dimensões.
    columns:
      - name: sales_sk
        tests: [unique, not_null]
      - name: customer_sk
        tests: [not_null, relationships: {to: ref('dim_customers'), field: customer_sk}]
      - name: product_sk
        tests: [not_null, relationships: {to: ref('dim_products'), field: product_sk}]
      - name: date_sk
        tests: [not_null, relationships: {to: ref('dim_date'), field: date_sk}]
      - name: item_total_amount
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"

  - name: rpt_sales_summary
    description: "Relatório agregado de KPIs de vendas por dia, categoria e canal."
    columns:
      - name: net_revenue
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
