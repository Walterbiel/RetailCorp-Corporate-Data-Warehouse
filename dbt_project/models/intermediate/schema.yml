version: 2

models:
  - name: int_orders_enriched
    description: >
      Join denormalizado entre order_items, orders, products e customers.
      Grão: 1 linha por item de pedido. Pedidos cancelados são excluídos.
      Usado como base para a fact_sales.
    columns:
      - name: order_item_id
        tests: [unique, not_null]
      - name: order_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: customer_id
        tests: [not_null]
      - name: order_date
        tests: [not_null]
      - name: item_total_amount
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
